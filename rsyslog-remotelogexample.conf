# Remote logging rules/templates
#
# Migration status:
# - Existing routing logic preserved
# - Encapsulated into dedicated ruleset structure
# - Inputs NOT yet bound to this ruleset
# - No stop statements added yet
#
# Goal:
# Prepare clean separation of remote logging from default/local logging


#################
#### TEMPLATES ##
#################

template(name="OtherLogs" type="string"
         string="/var/log/remotelogs/%FROMHOST-IP%/%PROGRAMNAME%.log")


############
### JSON ###
############

template(name="fw_json" type="list") {
    property(name="jsonmesg")
    constant(value="\n")
}

#################
#### RULESET ####
#################

ruleset(name="remote") {
    # Initialize defaults (important to avoid stale values)
    set $.base_ip = $fromhost-ip;
    set $.app = $programname;
    set $.fw_rule_raw = "";
    set $.fw_zone = "unknown";
    set $.fw_action = "unknown";
    set $.fw_src = "";
    set $.fw_dst = "";
    set $.fw_dpt = "";
    set $.fw_proto = "";
    set $.fw_sport = "";
    set $.fw_ttl = "";
    set $.fw_seq = "";
    set $.fw_window = "";
    set $.fw_iface = "";
    set $.ip_family = "unknown";
    set $.ip_flags = "";
    set $.device = "other";    
    set $.cleanmsg = ltrim($msg);
    #For now we only differentiate between router and everything else...

    # Start structured data extraction
    set $!event!kind = "firewall";
    set $!event!parser_version = "1";
    set $!event!reported_at = $timereported;
    set $!event!received_at = $timegenerated;
    set $!event!reported_tz = "Europe/Stockholm";
    set $!event!received_tz = "Europe/Stockholm";

    set $.fw_rule_raw = re_extract($msg, "\\[[^]]+\\]",0,0,"");
    set $.fw_zone = re_extract($.fw_rule_raw, "\\[([A-Z_]+)-",0,1,"unknown");
    set $.fw_rule_action = re_extract($.fw_rule_raw,"-([A-Z]+)-",0,1,"");

    if ($.fw_rule_action == "D") then {
       set $.fw_action = "drop";
    } else {
       set $.fw_action = "other";
    }
    set $.fw_rule_idnum = re_extract($.fw_rule_raw, "-([0-9]+)\\]",0,1, "");


   set $.fw_src = re_extract($msg, "SRC=([0-9A-Fa-f:\\.]+)", 0, 1, "");
   set $.fw_dst = re_extract($msg, "DST=([0-9A-Fa-f:\\.]+)", 0, 1, "");
   set $.fw_dpt = re_extract($msg, "DPT=([0-9]+)", 0, 1, "");
   set $.fw_proto = re_extract($msg, "PROTO=([A-Z]+)", 0, 1, "");
   set $.fw_sport = re_extract($msg, "SPT=([0-9]+)", 0, 1, "");
   set $.fw_ttl   = re_extract($msg, "TTL=([0-9]+)", 0, 1, "");
   set $.fw_seq   = re_extract($msg, "SEQ=([0-9]+)", 0, 1, "");
   set $.fw_window = re_extract($msg, "WINDOW=([0-9]+)", 0, 1, "");
   set $.fw_iface = re_extract($msg, "IN=([0-9a-zA-Z]+)", 0, 1, "");
   set $.tcp_syn = re_extract($msg, " SYN ", 0, 0, "") != "";
   set $.tcp_ack = re_extract($msg, " ACK ", 0, 0, "") != "";
   set $.tcp_fin = re_extract($msg, " FIN ", 0, 0, "") != "";
   set $.tcp_rst = re_extract($msg, " RST ", 0, 0, "") != "";
   set $.tcp_psh = re_extract($msg, " PSH ", 0, 0, "") != "";
   set $.tcp_urg = re_extract($msg, " URG ", 0, 0, "") != "";
   if ($.fw_src contains ":") then {
      set $.ip_family = "ipv6";
   } else {
      set $.ip_family = "ipv4";
   }

    if ($fromhost-ip == "10.0.0.1") then {
      set $.device = "router-name";
    }

    # Assign structured info

    set $!observer!ip = $fromhost-ip;
    set $!observer!name = $.device;

    set $!firewall!rule_raw = $.fw_rule_raw;
    set $!firewall!action = $.fw_action;
    set $!firewall!rule_id = $.fw_rule_idnum;
    set $!firewall!zone = $.fw_zone;
    set $!firewall!rule_key = $.fw_rule_raw;

    set $!debug!timegenerated_at = $timegenerated;
    set $!debug!timereported_at = $timereported;
    set $!debug!rule_idnum = $.fw_rule_idnum;


   set $!network!src_ip = $.fw_src;
   set $!network!dst_ip = $.fw_dst;
   set $!network!dst_port = $.fw_dpt;
   set $!network!src_port = $.fw_sport;
   set $!network!protocol = tolower($.fw_proto);
   set $!network!ttl = $.fw_ttl;
   set $!network!seq = $.fw_seq;
   set $!network!window = $.fw_window;
   set $!network!iface = $.fw_iface;
   set $!network!ip_family = $.ip_family;
   set $!network!fw_seq = $.fw_seq;
   set $!network!fw_window = $.fw_window;
   set $!network!tcp_flags!syn=$.tcp_syn;
   set $!network!tcp_flags!ack=$.tcp_ack;
   set $!network!tcp_flags!fin=$.tcp_fin;
   set $!network!tcp_flags!rst=$.tcp_rst;
   set $!network!tcp_flags!psh=$.tcp_psh;
   set $!network!tcp_flags!urg=$.tcp_urg;

   ## PARSED

   # -------------------------
   # ROUTING (simplified)
   # -------------------------

   # Router DROP traffic
   if ($.device == "router-name" and $.fw_action == "drop") then {

      action(
	type="omfile"
    	file="/var/log/remotelogs/router/firewall.log"
    	template="fw_json"
      )
   
      stop
   }

   # Router non-drop traffic
   if ($.device == "router-name") then {
      action(type="omfile" dynaFile="OtherLogs")
      stop
   }

   # If needed add routing for other devices, for now log to otherlogs

   # Fallback
   action(type="omfile" dynaFile="OtherLogs")

}
